services:
  mongodb:
    image: mongo:7.0.16
    container_name: weatherair-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-change_me}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change_me}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-weatherair_vienna}
      TZ: ${TZ:-Europe/Vienna}
    ports:
      - "${MONGO_PORT:-27017}:27017" # MongoDB host access
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
      
volumes:
  mongo_data:
